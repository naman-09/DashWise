# One-command demo:  docker compose up --build
#
#   1. `api` serves stateless upload/sample analysis at http://localhost:8000.
#   2. `frontend` serves the React console at http://localhost:8080.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    command: uvicorn dashwise.api:app --host 0.0.0.0 --port 8000
    environment:
      DASHWISE_CORS_ORIGINS: ${DASHWISE_CORS_ORIGINS:-*}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8080:80"
    depends_on:
      - api
