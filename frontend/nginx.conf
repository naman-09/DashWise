server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the analysis data — it's swapped in at container start.
    location = /analysis_results.json {
        add_header Cache-Control "no-store";
    }
}
